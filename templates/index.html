<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6cfc;
    --accent2: #fc6c8f;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --user-bg: #1e1a3a;
    --ai-bg: #151520;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #4caf87; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4caf87; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 48px 24px;
    animation: fadeIn 0.5s ease;
  }
  .welcome-icon { font-size: 48px; margin-bottom: 16px; }
  .welcome h2 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .welcome p { color: var(--muted); font-size: 14px; line-height: 1.6; max-width: 360px; margin: 0 auto 24px; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .suggestion {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 8px 16px; font-size: 13px;
    color: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .suggestion:hover { border-color: var(--accent); color: var(--text); background: var(--user-bg); }

  /* Messages */
  .message { display: flex; gap: 12px; animation: slideUp 0.3s ease; max-width: 800px; }
  .message.user { flex-direction: row-reverse; align-self: flex-end; }
  .message.ai { align-self: flex-start; }
  @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .avatar {
    width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
  }
  .avatar.ai { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .avatar.user { background: var(--user-bg); border: 1px solid var(--border); }

  .bubble {
    padding: 12px 16px; border-radius: 16px; font-size: 14px;
    line-height: 1.6; max-width: calc(100% - 48px);
  }
  .message.user .bubble {
    background: var(--user-bg); border: 1px solid rgba(124,108,252,0.3);
    border-radius: 16px 4px 16px 16px;
  }
  .message.ai .bubble {
    background: var(--ai-bg); border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px;
  }

  /* Typing indicator */
  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* Input area */
  .input-area {
    padding: 16px 24px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--ai-bg); border: 1px solid var(--border);
    border-radius: 16px; padding: 10px 10px 10px 16px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: rgba(124,108,252,0.5); }
  textarea {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; resize: none; max-height: 120px; min-height: 24px;
    line-height: 1.5;
  }
  textarea::placeholder { color: var(--muted); }
  .input-actions { display: flex; gap: 8px; align-items: center; }
  .clear-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 10px; padding: 8px 12px;
    font-size: 12px; cursor: pointer; transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .send-btn {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .send-btn:hover { opacity: 0.9; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; fill: white; }
  .footer-note { text-align: center; font-size: 11px; color: var(--muted); margin-top: 10px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">🤖</div>
    <div>
      <div class="header-title">AI Chatbot</div>
      <div class="header-sub">Powered by Groq · Llama 3.3 70B</div>
    </div>
  </div>
  <div class="status">
    <div class="status-dot"></div>
    Online · Free
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">✨</div>
    <h2>Hello, Malli!</h2>
    <p>Your AI chatbot is ready. Ask me anything — coding, learning, ideas, or just chat!</p>
    <div class="suggestions">
      <div class="suggestion" onclick="sendSuggestion(this)">Explain machine learning</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Write a Python function</div>
      <div class="suggestion" onclick="sendSuggestion(this)">What is an API?</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Help me learn Flask</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="messageInput" placeholder="Type your message..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <div class="input-actions">
      <button class="clear-btn" onclick="clearChat()">Clear</button>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
  <div class="footer-note">Built with Flask + Groq AI · Free to use</div>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const input = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendSuggestion(el) {
  input.value = el.textContent;
  sendMessage();
}

function addMessage(text, role) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const msg = document.createElement('div');
  msg.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'ai' ? '🤖' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
  return msg;
}

function addTyping() {
  const msg = document.createElement('div');
  msg.className = 'message ai';
  msg.id = 'typing';

  const avatar = document.createElement('div');
  avatar.className = 'avatar ai';
  avatar.textContent = '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  addTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    document.getElementById('typing')?.remove();

    if (data.response) {
      addMessage(data.response, 'ai');
    } else {
      addMessage('Error: ' + (data.error || 'Something went wrong'), 'ai');
    }
  } catch (e) {
    document.getElementById('typing')?.remove();
    addMessage('Connection error. Is the server running?', 'ai');
  }

  sendBtn.disabled = false;
  input.focus();
}

async function clearChat() {
  await fetch('/clear', { method: 'POST' });
  chatArea.innerHTML = '';
  const welcome = document.createElement('div');
  welcome.className = 'welcome';
  welcome.id = 'welcome';
  welcome.innerHTML = `
    <div class="welcome-icon">✨</div>
    <h2>Chat cleared!</h2>
    <p>Start a new conversation anytime.</p>
  `;
  chatArea.appendChild(welcome);
}
</script>
</body>
</html>
